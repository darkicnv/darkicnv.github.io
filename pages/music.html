<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Our Song ❤️</title>

<link rel="stylesheet"
href="../css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="hearts"></div>

<div class="sparkles"></div>

<main class="page fade">

<img

src="../assets/stickers/music-bear.png"

class="hero-img"

alt="Music Bear">

<h1>

Every Love Story
Has A Song 🎵

</h1>

<p>

Whenever this song plays...

it reminds me of you. ❤️

</p>

<div class="divider"></div>

<!--==================================
    Vinyl Record Player
===================================-->

<div class="player">

    <div class="record" id="record">

        <img

        src="../assets/icons/vinyl-record.png"

        alt="Vinyl Record">

        <div class="record-center">

            <span>

                For Mou ❤️

            </span>

        </div>

    </div>

</div>

<audio

id="song"

preload="metadata">

    <source

    src="../assets/music/our-song.mp3"

    type="audio/mpeg">

</audio>

<button

id="playBtn"

class="love-btn">

    ▶ Play Our Song

</button>

<p class="small">

    Tap the record or the button to play.

</p>

<div class="divider"></div>

<div class="music-message">

    <p class="typewriter">

        Every beat reminds me of your smile...
        Every lyric reminds me of your kindness...
        Every second reminds me how lucky I am to know you. ❤️

    </p>

</div>

<div class="buttons">

<a href="gallery.html" class="back-btn">

← Back

</a>

<a href="surprise.html" class="next-btn">

Next →

</a>

</div>

</div>

<script>

const song=document.getElementById("song");

const btn=document.getElementById("playBtn");

const lyrics=document.getElementById("lyrics");

btn.onclick=()=>{

if(song.paused){

song.play();

btn.innerHTML="⏸ Pause";

lyrics.style.opacity="1";

}else{

song.pause();

btn.innerHTML="▶ Play Our Song";

}

};

</script>

</body>

</html>
