<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFD6E8">

    <title>For My Princess ❤️</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <!-- Floating Sparkles -->
    <div class="sparkles"></div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="assets/music/love.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Button -->
    <button id="musicBtn" title="Music">
        <i class="fa-solid fa-music"></i>
    </button>

    <!-- Main Card -->
    <main class="container">

        <!-- Hero Sticker -->
        <img src="assets/stickers/hello.png"
            alt="Hello Kitty"
            class="hero-img">

        <!-- Welcome Text -->
        <div class="welcome-text">

            <h1>Hi, Mou! 🌸</h1>

            <p>Welcome to your little corner of my heart.</p>

            <p>I made this tiny world just for you,</p>

            <p>filled with little surprises,</p>

            <p>cute moments,</p>

            <p>and a lot of love.</p>

            <p class="last-line">
                Ready to explore, <strong>Bachha?</strong> ❤️
            </p>

            <a href="pages/smile.html" class="start-btn">
                Open My Heart ❤️
            </a>

        </div>

    </main>

    <!-- Footer -->
    <footer class="footer">

        Made with
        <span class="heart">❤️</span>
        especially for
        <strong>Mou</strong>

    </footer>
<div id="secretHeart">❤️</div>

<div id="emojiLock" class="hidden">

    <div class="lock-box">

        <h2>🔒 Secret Lock</h2>

        <p>Find the secret emoji to unlock.</p>

        <div id="emojiGrid"></div>

    </div>

</div>
    <!-- JavaScript -->
    <script src="js/app.js"></script>

</body>

                </html>
