<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFD6E8">

    <title>For My Princess ❤️</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<!-- Floating Hearts -->
<div class="hearts"></div>

<!-- Sparkles -->
<div class="sparkles"></div>

<!-- Music -->
<audio id="bgMusic" loop>
    <source src="assets/music/love.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">
    <i class="fa-solid fa-music"></i>
</button>

<!-- Main Card -->
<div class="container">

    <img src="assets/stickers/hello.png"
         class="hero-img"
         alt="Hello Kitty">

    <h1>
        Hi Princess 🌸
    </h1>

    <p class="subtitle">
        I made a tiny little world just for you...
        <br><br>
        Every page holds a little piece of my heart.
        <br><br>
        I hope it makes you smile today. ❤️
    </p>

    <a href="pages/smile.html" class="start-btn">
        Open My Heart
        <i class="fa-solid fa-heart"></i>
    </a>

</div>

<!-- Bottom Quote -->
<div class="bottom-text">

    Made with
    ❤️
    only for you.

</div>

<script src="js/app.js"></script>

</body>
</html>
